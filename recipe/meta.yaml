{% set name = "geowombat" %}
{% set version = "2.1.23" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/jgrss/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: fd52794584691e7837f672d993714d863bed77602f98edc0e7c9d33f7bc32873

build:
  number: 0
  skip: true  # [py<310 or py>312]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - cython                                 # [build_platform != target_platform]
    - numpy <2                               # [build_platform != target_platform]
    - {{ compiler('c') }}

  host:
    - python
    - meson-python
    - cython
    - numpy <2
    - setuptools-scm
    - pip

  run:
    - python
    - dask-core
    - distributed
    - geopandas
    - joblib
    - matplotlib-base
    - numpy <2
    - pandas
    - pyproj
    - rasterio <1.5.0
    - retry
    - requests
    - scikit-learn
    - scipy
    - shapely
    - tqdm
    - xarray
    - h5netcdf
    - h5py
    - cryptography
    - threadpoolctl
    - affine

test:
  imports:
    - geowombat
  requires:
    - pytest
  source_files:
    - tests
  commands:
    - pytest tests/test_clip.py
    - pytest tests/test_config.py
    # - pytest tests/test_coreg.py
    - pytest tests/test_extract.py
    - pytest tests/test_gdal.py
    - pytest tests/test_moving.py
    - pytest tests/test_nodata.py  # [not win]
    - pytest tests/test_open.py
    - pytest tests/test_properties.py
    # - pytest tests/test_rad.py
    - pytest tests/test_rasterio.py  # [not win]
    - pytest tests/test_scaling.py
    # - pytest tests/test_series.py  # [not win]
    - pytest tests/test_sops.py
    - pytest tests/test_vi.py
    - pytest tests/test_write.py  # [not win]
    - pytest tests/test_xarray.py

outputs:
    - name: geowombat
      requirements:
        build:
          - python                                 # [build_platform != target_platform]
          - cross-python_{{ target_platform }}     # [build_platform != target_platform]
          - cython                                 # [build_platform != target_platform]
          - numpy <2                               # [build_platform != target_platform]
          - {{ compiler('c') }}

        host:
          - python
          - meson-python
          - cython
          - numpy <2
          - setuptools-scm
          - pip

        run:
          - python
          - dask-core
          - distributed
          - geopandas
          - joblib
          - matplotlib-base
          - numpy <2
          - pandas
          - pyproj
          - rasterio <1.5.0
          - retry
          - requests
          - scikit-learn
          - scipy
          - shapely
          - tqdm
          - xarray
          - h5netcdf
          - h5py
          - cryptography
          - threadpoolctl
          - affine

      test:
        imports:
          - geowombat
        requires:
          - pytest
        source_files:
          - tests
        commands:
          - pytest tests/test_clip.py
          - pytest tests/test_config.py
          # - pytest tests/test_coreg.py
          - pytest tests/test_extract.py
          - pytest tests/test_gdal.py
          - pytest tests/test_moving.py
          - pytest tests/test_nodata.py  # [not win]
          - pytest tests/test_open.py
          - pytest tests/test_properties.py
          # - pytest tests/test_rad.py
          - pytest tests/test_rasterio.py  # [not win]
          - pytest tests/test_scaling.py
          # - pytest tests/test_series.py  # [not win]
          - pytest tests/test_sops.py
          - pytest tests/test_vi.py
          - pytest tests/test_write.py  # [not win]
          - pytest tests/test_xarray.py


    - name: geowombat-coreg
      requirements:
        host:
          - python
        run:
          - python
          - {{ pin_subpackage('geowombat', exact=True) }}
          - earthpy
          - pyfftw ==0.13.1
          - bottleneck
          - cartopy
          - cmocean
          - dill
          - geoarray >=0.15.0
          - geojson
          - folium >=0.6.0,!=0.12.0
          - pykrige
          - arosics
          - py-tools-ds >=0.18.0
          - pymorph
      test:
        imports:
          - geowombat
        requires:
          - pytest
        source_files:
          - tests
        commands:
          - pytest tests/test_coreg.py  # [not win]


    - name: geowombat-docs
      requirements:
        host:
          - python
        run:
          - python
          - {{ pin_subpackage('geowombat', exact=True) }}
          - numpydoc
          - sphinx >=6.0
          - sphinx-automodapi
          - sphinxcontrib-bibtex >=2.5.0
          - sphinx_tabs
          - pydata-sphinx-theme ==0.13.1
          - sphinx-book-theme >=1.0.0
          - sphinx-copybutton >=0.5.0
          - sphinx-autodoc-typehints
          - ipython
          - graphviz
          - sklearn-xarray-ext
      test:
        imports:
          - geowombat


    - name: geowombat-ml
      requirements:
        host:
          - python
        run:
          - python
          - {{ pin_subpackage('geowombat') }}
          - dask-ml >=2024.4.4
          - scikit-learn >=1.3.0
          - lightgbm
          - sklearn-xarray-ext
          - numpy_groupies
          - numba >=0.57.0
      test:
        imports:
          - geowombat
        requires:
          - pytest
        source_files:
          - tests
        commands:
          - pytest tests/ml_test.py


    - name: geowombat-perf
      requirements:
        host:
          - python
        run:
          - python
          - {{ pin_subpackage('geowombat', exact=True) }}
          - rtree
          - pygeos
          - netCDF4
          - ray-default >=2.3.0  # [not osx]
      test:
        imports:
          - geowombat


    - name: geowombat-stac
      requirements:
        host:
          - python
        run:
          - python
          - {{ pin_subpackage('geowombat', exact=True) }}
          - pystac
          - pystac-client
          - stackstac >=0.5.1
          - planetary-computer
          - Rich
          - wget  # [not win]
          - wrapt-timeout-decorator
      test:
        imports:
          - geowombat


    - name: geowombat-tests
      requirements:
        host:
          - python
        run:
          - python
          - {{ pin_subpackage('geowombat', exact=True) }}
          - testfixtures
          - jax  # [not win]
          - jaxlib  # [not win]
          - pre-commit
          - black
          - flake8
          - docformatter
          - isort
          - validators
      test:
        imports:
          - geowombat
        requires:
          - pytest
        source_files:
          - tests
        commands:
          - pytest tests/test_series.py  # [not win]


    - name: geowombat-time
      requirements:
        host:
          - python
        run:
          - python
          - {{ pin_subpackage('geowombat', exact=True) }}
          - dateparser
      test:
        imports:
          - geowombat


    - name: geowombat-view
      requirements:
        host:
          - python
        run:
          - python
          - {{ pin_subpackage('geowombat', exact=True) }}
          - ipython
          - bokeh
          - descartes
          - graphviz
      test:
        imports:
          - geowombat


    - name: geowombat-web
      requirements:
        host:
          - python
        run:
          - python
          - {{ pin_subpackage('geowombat', exact=True) }}
          - gsutil
          - requests
          - wget
      test:
        imports:
          - geowombat


    - name: geowombat-zarr
      requirements:
        host:
          - python
        run:
          - python
          - {{ pin_subpackage('geowombat', exact=True) }}
          - zarr
          - numcodecs
      test:
        imports:
          - geowombat

about:
  home: https://github.com/jgrss/geowombat
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: GeoWombat provides utilities to process geospatial raster data.
  doc_url: https://geowombat.readthedocs.io/
  dev_url: https://github.com/jgrss/geowombat

extra:
  recipe-maintainers:
    - mxr-conda
    - jgrss
    - mmann1123

# notes:
# build local: `python build-locally.py`
# get sha256: wget -qO- https://github.com/jgrss/geowombat/archive/refs/tags/v<VERSION>.tar.gz | sha256sum
